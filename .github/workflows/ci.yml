name: CI Pipeline
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Java 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw -B test -Dspring.profiles.active=test
