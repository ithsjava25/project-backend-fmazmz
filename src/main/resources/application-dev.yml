spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/case_manager_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      platform: postgresql

app:
  cors:
    allow-localhost-origins: true

logging:
  level:
    org.fmazmz.casemanager: warn
    org.springframework: info
    org.hibernate: info