server:
  port: 8080

logging:
  file:
    name: logs/application.log
  structured:
    format:
      file: logstash

spring:
  application:
    name: case-manager
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      platform: postgresql

  data:
    web:
      pageable:
        max-page-size: 100
        default-page-size: 20
        page-parameter: page
        size-parameter: size
        sort-parameter: sort

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:  
              - read:user
              - user:email

app:
  # When true (e.g. application-dev), allow any http://localhost:* and http://127.0.0.1:* origin
  cors:
    allow-localhost-origins: false

  frontend:
    url: http://localhost:5173

  security:
    bootstrap-admin-emails: ["firasmoussa60@gmail.com"]

  storage:
    provider: s3
    # Duration of S3 pre-signed GET URLs
    presign-get-duration-minutes: 15
    s3:
      bucket: ${AWS_S3_BUCKET}
      region: ${AWS_REGION}
      public-base-url: ${AWS_S3_PUBLIC_BASE_URL}